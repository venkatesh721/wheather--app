<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Weather App</title>
</head>
<body>

    <div class="container">

        <h1>Weather App</h1>

        <input
            type="text"
            id="city"
            placeholder="Enter City Name">

        <button id="searchBtn">
            Get Weather
        </button>

        <div id="weather-box">
            <p id="indicator"></p>
            <h2 id="icon">🌤️</h2>
            <h2 id="city-name"></h2>

            <p id="temp"></p>

            <p id="weather"></p>

            <p id="humidity"></p>

            <p id="wind"></p>

        </div>

    </div>
 <script src="main.js"></script>

</body>
</html>
